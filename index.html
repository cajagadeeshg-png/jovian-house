<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jovian House | Fashion Beyond Gravity</title>
<style>
body { font-family: 'Cormorant Garamond', serif; background:#f7f5f0; margin:0; }
header{background:linear-gradient(90deg,#0f0f0f,#151515,#241b08);padding:12px 6%;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:1000;}
.logo img{height:65px;}
nav a{color:white;text-decoration:none;margin-left:25px;font-size:18px;transition:0.3s;}
nav a:hover{color:#d4af37;}
.section { padding:40px; text-align:center; }
.grid { display:flex; justify-content:center; gap:30px; }
.grid img { width:300px; height:400px; object-fit:cover; cursor:pointer; border-radius:12px; box-shadow:0 5px 15px rgba(0,0,0,.1); transition:0.3s; }
.grid img:hover { transform:scale(1.05); }
.hidden { display:none; }
.products { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:25px; margin-top:30px; }
.card { background:white; border-radius:12px; box-shadow:0 5px 15px rgba(0,0,0,.08); overflow:hidden; }
.card img { width:100%; height:280px; object-fit:cover; }
.card-content { padding:20px; text-align:center; }
.btn { display:inline-block; padding:10px 20px; background:#d4af37; color:black; text-decoration:none; font-weight:bold; border-radius:6px; margin-top:10px; }
</style>
</head>
<body>

<!-- Header (unchanged) -->
<header>
  <div class="logo"><img src="JH.png" alt="Jovian House Logo"></div>
  <div class="menu-toggle">☰</div>
  <nav>
    <a href="#essentials">Essentials</a>
    <a href="#linen">Linen</a>
    <a href="#signature">Signature</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<!-- Step 1: Front page -->
<section class="section" id="homepage">
  <h2>Explore Jovian Collections</h2>
  <div class="grid">
    <img src="https://picsum.photos/300/400?random=1" alt="Essentials" onclick="selectBucket('essentials')">
    <img src="https://picsum.photos/300/400?random=2" alt="Linen" onclick="selectBucket('linen')">
    <img src="https://picsum.photos/300/400?random=3" alt="Signature" onclick="selectBucket('signature')">
  </div>
</section>

<!-- Step 2: Gender Selection -->
<section class="section hidden" id="gender">
  <h2>Select Gender</h2>
  <button class="btn" onclick="selectGender('men')">Men</button>
  <button class="btn" onclick="selectGender('women')">Women</button>
</section>

<!-- Step 3: Product Hierarchy -->
<section class="section hidden" id="products">
  <h2 id="bucket-title"></h2>
  <div class="products" id="product-list"></div>
</section>

<script>
let currentBucket = '';
let currentGender = '';

function selectBucket(bucket) {
  currentBucket = bucket;
  document.getElementById('homepage').classList.add('hidden');
  document.getElementById('gender').classList.remove('hidden');
}

function selectGender(gender) {
  currentGender = gender;
  document.getElementById('gender').classList.add('hidden');
  document.getElementById('products').classList.remove('hidden');
  document.getElementById('bucket-title').innerText = 
    `Jovian ${capitalize(currentBucket)} - ${capitalize(currentGender)}`;
  loadProducts();
}

function loadProducts() {
  const productList = document.getElementById('product-list');
  productList.innerHTML = '';
  for (let i=1; i<=10; i++) {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <img id="prod-${i}" src="https://picsum.photos/300/280?random=${i}" alt="Product ${i}">
      <div class="card-content">
        <h3>${capitalize(currentBucket)} ${capitalize(currentGender)} Product ${i}</h3>
        <p class="price">₹${999+i*100}</p>
        <button class="btn" onclick="toggleOptions('options-${i}')">Choose Size & Colour</button>
        <div id="options-${i}" class="hidden">
          <label>Size:</label>
          <select>
            <option>XS</option><option>S</option><option>M</option>
            <option>L</option><option>XL</option><option>XXL</option>
          </select>
          <label>Colour:</label>
          <select onchange="changeColor('prod-${i}', this.value)">
            <option value="https://picsum.photos/300/280?random=100">Black</option>
            <option value="https://picsum.photos/300/280?random=101">White</option>
            <option value="https://picsum.photos/300/280?random=102">Navy</option>
            <option value="https://picsum.photos/300/280?random=103">Grey</option>
            <option value="https://picsum.photos/300/280?random=104">Olive</option>
            <option value="https://picsum.photos/300/280?random=105">Beige</option>
            <option value="https://picsum.photos/300/280?random=106">Pastel Pink</option>
            <option value="https://picsum.photos/300/280?random=107">Sky Blue</option>
            <option value="https://picsum.photos/300/280?random=108">Sage Green</option>
            <option value="https://picsum.photos/300/280?random=109">Charcoal</option>
            <option value="https://picsum.photos/300/280?random=110">Red</option>
            <option value="https://picsum.photos/300/280?random=111">Gold</option>
            <option value="https://picsum.photos/300/280?random=112">Silver</option>
          </select>
          <br><br>
          <a href="https://wa.me/919999999999" class="btn">Order</a>
        </div>
      </div>`;
    productList.appendChild(card);
  }
}

function toggleOptions(id) {
  const el = document.getElementById(id);
  el.classList.toggle('hidden');
}

function changeColor(imgId, newSrc) {
  document.getElementById(imgId).src = newSrc;
}

function capitalize(str) {
  return str.charAt(0).toUpperCase() + str.slice(1);
}
</script>

</body>
</html>
